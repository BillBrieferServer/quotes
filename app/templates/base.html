<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <h1>&#9998; Quotes</h1>
        <nav class="top-nav">
            <a href="/" class="{% if active == 'home' %}active{% endif %}">&#128221; Notes</a>
            <a href="/add?type=quote" class="{% if active == 'add' %}active{% endif %}">&#10133; Add</a>
            <a href="/browse" class="{% if active == 'browse' %}active{% endif %}">&#128278; Topics</a>
            <a href="/search" class="{% if active == 'search' %}active{% endif %}">&#128270; Search</a>
            <a href="/trash" class="{% if active == 'trash' %}active{% endif %}">&#128465; Trash</a>
        </nav>
        <a href="/logout" class="logout-link">Logout</a>
    </div>

    <div class="page-body {% block body_class %}scrollable{% endblock %}">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    </div>
</body>
</html>
