<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <h1>Quotes</h1>
        <a href="/logout">Logout</a>
    </div>

    <div class="page-body {% block body_class %}scrollable{% endblock %}">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    </div>

    <nav class="bottom-nav">
        <a href="/" class="{% if active == 'home' %}active{% endif %}">
            <span class="nav-icon">&#9776;</span>
            <span>Notes</span>
        </a>
        <a href="/add?type=quote" class="{% if active == 'add' %}active{% endif %}">
            <span class="nav-icon">&#43;</span>
            <span>Add</span>
        </a>
        <a href="/browse" class="{% if active == 'browse' %}active{% endif %}">
            <span class="nav-icon">&#9733;</span>
            <span>Topics</span>
        </a>
        <a href="/search" class="{% if active == 'search' %}active{% endif %}">
            <span class="nav-icon">&#128269;</span>
            <span>Search</span>
        </a>
    </nav>
</body>
</html>
